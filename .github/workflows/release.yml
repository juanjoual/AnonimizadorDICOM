name: Build and Release

on:
  push:
    tags:
      - 'v*'   # se dispara con tags tipo v1.0.0, v2.3.1, etc.

permissions:
  contents: write   # necesario para crear la release

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias del sistema (tkinter)
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Instalar dependencias Python
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compilar (Linux)
        run: bash build_linux.sh   # ajusta si tu script es .py o tiene otro nombre

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: dist/*   # ajusta a donde deje el ejecutable tu .spec

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compilar (Windows)
        run: .\build_windows.bat   # ajusta extensión/nombre real

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: dist/*

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Descargar artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/build-linux/*
            artifacts/build-windows/*
          generate_release_notes: true